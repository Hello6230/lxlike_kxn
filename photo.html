<style type="text/tailwindcss">
@layer utilities {

  .glass {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.8);
  }

  .photo-hover {
    transition: all .35s ease;
  }
  .photo-hover:hover {
    transform: scale(1.05) rotate(-0.5deg);
    box-shadow: 0 18px 40px rgba(232,168,192,0.35);
  }

  .float-up {
    animation: float 4s infinite ease-in-out;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .star {
    position:absolute;
    background:#fff;
    border-radius:50%;
    opacity:.7;
    animation: twinkle 3s infinite;
  }

  @keyframes twinkle {
    0%,100%{opacity:.2}
    50%{opacity:.9}
  }

  /* ===== 放大层（修复版） ===== */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .lightbox img,
  .lightbox video {
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 40px);
    border-radius: 12px;
    object-fit: contain;
  }
}

body {
  background: linear-gradient(135deg,#FFF5F9,#F8D7E2,#F9E4ED);
  background-attachment: fixed;
}

<!-- ===== 放大层（已修复关闭） ===== -->
<div id="lightbox" class="lightbox">

  <!-- ✔ 右上角关闭按钮（绝对可靠） -->
  <button
    onclick="closeLightbox()"
    class="fixed top-6 right-6 z-[1000] text-white text-4xl font-bold bg-black/40 w-12 h-12 rounded-full flex items-center justify-center hover:bg-black/70">
    ×
  </button>

  <img id="lightboxImg" class="hidden">
  <video id="lightboxVideo" class="hidden" controls></video>

</div>

<script>

// 星星
function createStars(){
  const box = document.getElementById('starBox');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.width = Math.random()*3+1+'px';
    s.style.height = s.style.width;
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = Math.random()*3+'s';
    box.appendChild(s);
  }
}
createStars();

// ===== 放大逻辑 =====
const lightbox = document.getElementById('lightbox');
const imgBox = document.getElementById('lightboxImg');
const videoBox = document.getElementById('lightboxVideo');

// 打开
document.querySelectorAll('.preview-media').forEach(el => {
  el.addEventListener('click', () => {

    lightbox.style.display = 'flex';

    if(el.tagName === 'IMG'){
      imgBox.src = el.src;
      imgBox.classList.remove('hidden');
      videoBox.classList.add('hidden');
      videoBox.pause();
    }

    if(el.tagName === 'VIDEO'){
      videoBox.src = el.querySelector('source').src;
      videoBox.classList.remove('hidden');
      imgBox.classList.add('hidden');
      videoBox.play();
    }

  });
});

// 关闭（唯一可靠方式）
function closeLightbox(){
  lightbox.style.display = 'none';
  videoBox.pause();
}

// 点击黑色遮罩区域关闭弹窗
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    closeLightbox();
  }
})
</script>
